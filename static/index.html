<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2048</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="top">
        <div class="brand">
          <h1>2048</h1>
          <p class="sub">Cornerstone widget</p>
        </div>
        <div class="scores">
          <div class="pill">
            <span class="label">Score</span>
            <span id="scoreVal">0</span>
          </div>
          <div class="pill">
            <span class="label">Best</span>
            <span id="bestVal">0</span>
          </div>
        </div>
      </header>

      <p id="userLine" class="user-line" hidden></p>
      <p id="authMsg" class="auth-msg"></p>

      <div class="layout">
        <section class="game-wrap">
          <div
            id="board"
            class="board"
            tabindex="0"
            role="application"
            aria-label="2048 game board"
          ></div>
          <div id="pauseLayer" class="pause-layer" hidden>
            <div class="pause-card">Paused</div>
          </div>
          <div id="overlay" class="overlay" hidden>
            <div class="overlay-card">
              <p id="overlayTitle" class="overlay-title"></p>
              <button type="button" id="btnNew" class="btn">New game</button>
            </div>
          </div>
        </section>

        <aside class="side">
          <h2>Leaderboard</h2>
          <p class="hint">Best score ever (this tenant)</p>
          <ul id="leaderList" class="leader-list"></ul>
        </aside>
      </div>
    </div>
    <script src="/game.js" defer></script>
  </body>
</html>
